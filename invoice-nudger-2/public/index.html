<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Nudge Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Intelligence | Smart Nudge System</span>
            <div class="d-flex">
                <button id="showChat" class="btn btn-outline-light me-2">Chat View</button>
                <button id="showManager" class="btn btn-outline-light">Manager View</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Chat View -->
        <div id="chatView" class="view">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card chat-container">
                        <div class="card-header bg-primary text-white">
                            <strong>Behavioral Nudge Bot</strong>
                        </div>
                        <div id="nudgeList" class="card-body chat-messages">
                            <!-- Nudges will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Manager View -->
        <div id="managerView" class="view d-none">
            <div class="row">
                <div class="col-md-4">
                    <div class="card text-center mb-4">
                        <div class="card-body">
                            <h5 class="card-title">Overall Completion Rate</h5>
                            <div class="display-4 text-primary" id="completionRate">0%</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header">
                            Client Group Rankings (Clearance Efficiency)
                        </div>
                        <div class="card-body">
                            <ul id="rankingList" class="list-group list-group-flush">
                                <!-- Rankings will be injected here -->
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="actionToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header bg-success text-white">
                <strong class="me-auto">Action Confirmed</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                Action processed successfully.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
